version: '3.8'

services:
  # 1. POSTGRESQL VERITABANI SERVISI
  postgresdb:
    image: postgres:14.19-alpine3.21
    container_name: project_postgres_db
    restart: always
    environment:
      POSTGRES_USER: projectuser 
      POSTGRES_PASSWORD: 8086 
      POSTGRES_DB: projectdb 
    volumes:
      - postgres_data:/var/lib/postgresql/data
    ports:
      - "5432:5432"
    healthcheck:
      test: [ "CMD", "pg_isready", "-U", "projectuser", "-d", "projectdb" ]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - project_network

  # 2. REDIS ÖNBELLEK SERVISI
  redis:
    image: redis:7-alpine
    container_name: project_redis
    restart: always
    ports:
      - "6379:6379"
    networks:
      - project_network

  # 3. ASP.NET CORE API SERVISI
  api:
    build:
      context: ./Project.API
      target: final
    container_name: project_api_server
    ports:
      - "0.0.0.0:8080:8080"
    restart: always
    environment:
      ConnectionStrings__DefaultConnection: "Host=postgresdb;Port=5432;Database=projectdb;Username=projectuser;Password=8086"
      ConnectionStrings__Redis: "redis" 
      AppSettings__Token: "5676b47ff209d3e9eb1518ccc3144cbb"
      ASPNETCORE_ENVIRONMENT: "Development"
      ASPNETCORE_URLS: "http://0.0.0.0:8080"
    depends_on:
      postgresdb:
        condition: service_healthy
      redis:
        condition: service_started
    networks:
      - project_network

  # 4. ASP.NET CORE WEB SERVISI
  web:
    build:
      context: ./Project.web
      target: final
    container_name: project_web_server
    ports:
      - "0.0.0.0:5002:8080"
    restart: always
    environment:
      ApiSettings__ProjectApiBaseUrl: "http://api:8080"
      ASPNETCORE_ENVIRONMENT: "Development"
      ASPNETCORE_URLS: "http://0.0.0.0:8080"
    depends_on:
      - api
    networks:
      - project_network

networks:
  project_network:
    driver: bridge

volumes:
  postgres_data:
